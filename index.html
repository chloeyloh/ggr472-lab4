<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGR472 Lab 4</title>
    <!-- Mapbox API -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css' rel='stylesheet' />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Turf.js -->
    <script src='https://unpkg.com/@turf/turf@7.2.0/turf.min.js'></script>
</head>

<body>

    <!-- MAP CONTAINER -->
    <div id='map' class='map'></div>

    <!-- LEGEND CONTAINER -->
    <div id="legend" class="legend">
        <h3>Hexagon Legend</h3>
        <div><span style="background-color: rgba(255, 0, 0, 0.5); width: 20px; height: 20px; display: inline-block;"></span> High Density</div>
        <div><span style="background-color: rgba(255, 165, 0, 0.5); width: 20px; height: 20px; display: inline-block;"></span> Medium Density</div>
        <div><span style="background-color: rgba(0, 128, 0, 0.5); width: 20px; height: 20px; display: inline-block;"></span> Low Density</div>
    </div>

    <script src="script.js"></script>
    <script src="script-legend.js"></script>

</body>

</html>
